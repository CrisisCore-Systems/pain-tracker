<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>PainTracker Visual Asset Preview</title>
<style>

:root {
  --pt-bg: #071014;
  --pt-bg-2: #0B1720;
  --pt-panel: #10212A;
  --pt-panel-2: #142B35;
  --pt-line: #25414C;
  --pt-text: #F6FAFC;
  --pt-muted: #A8BAC3;
  --pt-mint: #6EE7B7;
  --pt-cyan: #67E8F9;
  --pt-violet: #A78BFA;
  --pt-amber: #FBBF24;
  --pt-red: #FB7185;
}

.paintracker-asset-shell {
  margin: clamp(2rem, 5vw, 5rem) auto;
  max-width: 1120px;
  border: 1px solid rgba(110, 231, 183, 0.18);
  border-radius: 28px;
  overflow: hidden;
  background: #071014;
  box-shadow: 0 24px 80px rgba(0,0,0,.22);
}

.paintracker-asset-shell img,
.paintracker-asset-shell svg {
  display: block;
  width: 100%;
  height: auto;
}

.paintracker-trust-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 1rem;
}

@media (max-width: 760px) {
  .paintracker-trust-grid {
    grid-template-columns: 1fr;
  }
}

body {
  margin: 0;
  background: #071014;
  color: #F6FAFC;
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
main {
  width: min(1180px, calc(100% - 32px));
  margin: 48px auto;
}
h1 { font-size: clamp(2rem, 5vw, 4rem); margin: 0 0 12px; letter-spacing: -0.04em; }
p { color: #A8BAC3; font-size: 1.1rem; }
.card {
  margin: 32px 0;
  padding: 18px;
  border: 1px solid rgba(110,231,183,.18);
  border-radius: 28px;
  background: rgba(255,255,255,.03);
}
.card h2 { font-size: 1rem; color: #A8BAC3; font-weight: 700; }
.card img { width: 100%; border-radius: 20px; display: block; background: #071014; }
</style>
</head>
<body>
<main>
  <h1>PainTracker Visual Asset Preview</h1>
  <p>Four web-ready SVG assets for privacy, offline, export, and low-friction logging sections.</p>
  <section class="card">
      <h2>paintracker-local-first-architecture.svg</h2>
      <img src="paintracker-local-first-architecture.svg" alt="paintracker-local-first-architecture.svg" />
    </section>
<section class="card">
      <h2>paintracker-flare-safe-logging-flow.svg</h2>
      <img src="paintracker-flare-safe-logging-flow.svg" alt="paintracker-flare-safe-logging-flow.svg" />
    </section>
<section class="card">
      <h2>paintracker-no-account-no-cloud-og.svg</h2>
      <img src="paintracker-no-account-no-cloud-og.svg" alt="paintracker-no-account-no-cloud-og.svg" />
    </section>
<section class="card">
      <h2>paintracker-privacy-refusal-strip.svg</h2>
      <img src="paintracker-privacy-refusal-strip.svg" alt="paintracker-privacy-refusal-strip.svg" />
    </section>
</main>
</body>
</html>
