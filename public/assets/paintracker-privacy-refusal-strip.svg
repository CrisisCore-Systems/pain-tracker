<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1600 560">
  <title id="title">PainTracker privacy refusal trust strip</title>
  <desc id="desc">A horizontal icon strip listing things PainTracker avoids collecting or imposing by default, including forced accounts, default sync, hidden portals, streak pressure, and ad tech.</desc>
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1720"/>
      <stop offset="52%" stop-color="#071014"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="mintHalo" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity=".22"/>
      <stop offset="60%" stop-color="#67E8F9" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: url(#bgGlow); }
      .halo { fill: url(#mintHalo); }
      .panel { fill: #10212A; stroke: #25414C; stroke-width: 2; filter: url(#softShadow); }
      .panel2 { fill: #142B35; stroke: #315768; stroke-width: 2; }
      .soft { fill: #0B1720; stroke: #25414C; stroke-width: 1.5; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 48px; font-weight: 800; fill: #F6FAFC; letter-spacing: -1px; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; font-weight: 500; fill: #A8BAC3; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; font-weight: 700; fill: #F6FAFC; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 500; fill: #A8BAC3; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; fill: #A8BAC3; letter-spacing: .8px; text-transform: uppercase; }
      .mint { fill: #6EE7B7; }
      .cyan { fill: #67E8F9; }
      .violet { fill: #A78BFA; }
      .amber { fill: #FBBF24; }
      .red { fill: #FB7185; }
      .stroke-mint { stroke: #6EE7B7; }
      .stroke-cyan { stroke: #67E8F9; }
      .stroke-violet { stroke: #A78BFA; }
      .stroke-amber { stroke: #FBBF24; }
      .stroke-muted { stroke: #496979; }
      .noFill { fill: none; }
      .dash { stroke-dasharray: 8 10; }
      .round { stroke-linecap: round; stroke-linejoin: round; }
      
    </style>
  </defs>
  
<rect class="bg" width="1600" height="560"/>
<circle class="halo" cx="1180" cy="220" r="500"/>
<text x="86" y="95" class="title">What PainTracker refuses to collect by default</text>
<text x="90" y="135" class="subtitle">A visual trust strip for privacy sections, homepage cards, and resource pages.</text>

<g transform="translate(90,215)">
  <rect width="255" height="220" rx="30" class="panel"/>
  <circle cx="58" cy="65" r="32" fill="#071014" stroke="#6EE7B7" stroke-width="4"/>
  <path d="M40 66 h36 M58 48 v36" class="noFill stroke-mint round" stroke-width="6"/>
  <text x="35" y="130" class="label">No forced account</text>
  <text x="35" y="164" class="small">less identity linkage</text>
</g>
<g transform="translate(390,215)">
  <rect width="255" height="220" rx="30" class="panel"/>
  <circle cx="58" cy="65" r="32" fill="#071014" stroke="#67E8F9" stroke-width="4"/>
  <path d="M42 72 c16 -38 48 -38 64 0" class="noFill stroke-cyan round" stroke-width="6"/>
  <path d="M39 91 h40" class="noFill stroke-cyan round" stroke-width="6"/>
  <text x="35" y="130" class="label">No default sync</text>
  <text x="35" y="164" class="small">offline first, not cloud first</text>
</g>
<g transform="translate(690,215)">
  <rect width="255" height="220" rx="30" class="panel"/>
  <circle cx="58" cy="65" r="32" fill="#071014" stroke="#A78BFA" stroke-width="4"/>
  <path d="M42 64 h32 l18 18 h-50z M42 44 h52 v28" class="noFill stroke-violet round" stroke-width="5"/>
  <text x="35" y="130" class="label">No hidden portal</text>
  <text x="35" y="164" class="small">exports are files you control</text>
</g>
<g transform="translate(990,215)">
  <rect width="255" height="220" rx="30" class="panel"/>
  <circle cx="58" cy="65" r="32" fill="#071014" stroke="#FBBF24" stroke-width="4"/>
  <path d="M38 78 c12 -40 30 -10 42 -42 c6 34 28 24 28 54" class="noFill stroke-amber round" stroke-width="5"/>
  <text x="35" y="130" class="label">No streak pressure</text>
  <text x="35" y="164" class="small">support without shame loops</text>
</g>
<g transform="translate(1290,215)">
  <rect width="220" height="220" rx="30" class="panel"/>
  <circle cx="58" cy="65" r="32" fill="#071014" stroke="#FB7185" stroke-width="4"/>
  <path d="M40 88 l38 -48 M42 44 h60 v50" class="noFill stroke-red round" stroke-width="6"/>
  <text x="35" y="130" class="label">No ad-tech</text>
  <text x="35" y="164" class="small">health data is not bait</text>
</g>

</svg>
