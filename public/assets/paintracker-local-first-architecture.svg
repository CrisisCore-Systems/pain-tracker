<svg xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc" viewBox="0 0 1600 900">
  <title id="title">PainTracker local-first architecture visual</title>
  <desc id="desc">A section graphic showing pain entries remaining on the user&#x27;s device, no account gate, no default cloud, and explicit export to clinician-ready files.</desc>
  <defs>
    <linearGradient id="bgGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1720"/>
      <stop offset="52%" stop-color="#071014"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <radialGradient id="mintHalo" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#6EE7B7" stop-opacity=".22"/>
      <stop offset="60%" stop-color="#67E8F9" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".35"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .bg { fill: url(#bgGlow); }
      .halo { fill: url(#mintHalo); }
      .panel { fill: #10212A; stroke: #25414C; stroke-width: 2; filter: url(#softShadow); }
      .panel2 { fill: #142B35; stroke: #315768; stroke-width: 2; }
      .soft { fill: #0B1720; stroke: #25414C; stroke-width: 1.5; }
      .title { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 48px; font-weight: 800; fill: #F6FAFC; letter-spacing: -1px; }
      .subtitle { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 23px; font-weight: 500; fill: #A8BAC3; }
      .label { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 22px; font-weight: 700; fill: #F6FAFC; }
      .small { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 16px; font-weight: 500; fill: #A8BAC3; }
      .tiny { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; font-weight: 700; fill: #A8BAC3; letter-spacing: .8px; text-transform: uppercase; }
      .mint { fill: #6EE7B7; }
      .cyan { fill: #67E8F9; }
      .violet { fill: #A78BFA; }
      .amber { fill: #FBBF24; }
      .red { fill: #FB7185; }
      .stroke-mint { stroke: #6EE7B7; }
      .stroke-cyan { stroke: #67E8F9; }
      .stroke-violet { stroke: #A78BFA; }
      .stroke-amber { stroke: #FBBF24; }
      .stroke-muted { stroke: #496979; }
      .noFill { fill: none; }
      .dash { stroke-dasharray: 8 10; }
      .round { stroke-linecap: round; stroke-linejoin: round; }
      
    </style>
  </defs>
  
<rect class="bg" width="1600" height="900" rx="0"/>
<circle class="halo" cx="800" cy="450" r="620"/>
<path d="M0 760 C240 680 360 820 560 735 C800 633 930 740 1110 680 C1320 610 1450 715 1600 650 L1600 900 L0 900 Z" fill="#0E1A20" opacity=".7"/>
<text x="100" y="118" class="title">Local-first pain records</text>
<text x="102" y="158" class="subtitle">Your health data stays on your device until you choose to export it.</text>

<rect x="125" y="245" width="455" height="430" rx="34" class="panel"/>
<rect x="170" y="300" width="365" height="74" rx="18" class="panel2"/>
<circle cx="215" cy="337" r="19" class="mint"/>
<text x="250" y="330" class="label">Pain entry</text>
<text x="250" y="354" class="small">level · location · trigger · note</text>

<rect x="170" y="402" width="365" height="74" rx="18" class="panel2"/>
<circle cx="215" cy="439" r="19" class="cyan"/>
<text x="250" y="432" class="label">Encrypted local store</text>
<text x="250" y="456" class="small">browser storage under user control</text>

<rect x="170" y="505" width="365" height="94" rx="18" class="soft"/>
<path d="M232 548 a42 42 0 1 0 1 0" class="noFill stroke-mint round" stroke-width="6"/>
<path d="M212 548 h42 m-21 -21 v42" class="noFill stroke-cyan round" stroke-width="5"/>
<text x="286" y="541" class="label">Works offline</text>
<text x="286" y="567" class="small">flare logging survives weak signal</text>

<text x="178" y="638" class="tiny">Primary trust boundary</text>
<line x1="168" y1="646" x2="535" y2="646" class="stroke-mint round" stroke-width="4" opacity=".65"/>

<rect x="690" y="260" width="250" height="145" rx="28" class="panel2"/>
<path d="M770 327 h86 a31 31 0 0 1 0 62 h-86 a31 31 0 0 1 0 -62z" fill="#071014" stroke="#67E8F9" stroke-width="3"/>
<circle cx="856" cy="358" r="25" class="cyan" filter="url(#glow)"/>
<text x="722" y="305" class="label">No account gate</text>
<text x="722" y="438" class="small">open · log · keep control</text>

<rect x="1035" y="245" width="420" height="430" rx="34" class="panel"/>
<text x="1082" y="312" class="label">Export only when needed</text>
<text x="1082" y="346" class="small">PDF · CSV · JSON for appointments, claims, records</text>

<rect x="1090" y="400" width="142" height="185" rx="18" fill="#F6FAFC"/>
<rect x="1112" y="432" width="80" height="10" rx="5" fill="#25414C"/>
<rect x="1112" y="460" width="98" height="8" rx="4" fill="#A8BAC3"/>
<rect x="1112" y="485" width="72" height="8" rx="4" fill="#A8BAC3"/>
<rect x="1112" y="525" width="92" height="8" rx="4" fill="#6EE7B7"/>
<path d="M1120 560 C1146 535 1160 583 1198 548" class="noFill stroke-cyan round" stroke-width="5"/>

<rect x="1260" y="418" width="142" height="150" rx="26" fill="#0B1720" stroke="#496979" stroke-width="2"/>
<path d="M1302 494 c0 -30 14 -54 30 -54 s30 24 30 54 c0 22 -14 36 -30 36 s-30 -14 -30 -36z" fill="#142B35" stroke="#A78BFA" stroke-width="3"/>
<circle cx="1332" cy="490" r="8" class="violet"/>
<text x="1292" y="604" class="tiny">Clinician-ready</text>

<path d="M586 460 C635 460 646 350 690 350" class="noFill stroke-muted dash round" stroke-width="5"/>
<path d="M940 350 C992 350 992 460 1035 460" class="noFill stroke-cyan dash round" stroke-width="5"/>
<path d="M1006 448 l29 12 l-28 13" class="noFill stroke-cyan round" stroke-width="5"/>
<path d="M663 338 l27 12 l-27 12" class="noFill stroke-muted round" stroke-width="5"/>

<rect x="690" y="505" width="250" height="122" rx="26" class="soft"/>
<text x="728" y="552" class="label">No default cloud</text>
<path d="M744 590 h134" class="noFill stroke-amber round" stroke-width="5"/>
<path d="M790 562 l72 72" class="noFill stroke-amber round" stroke-width="6"/>
<text x="726" y="670" class="tiny">Refusal as architecture</text>

</svg>
