<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Page Not Found</title>
<style>
  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }
</style>
<script>
  // Simple redirect to root for SPA routing
  // Let React Router handle the 404 page
  globalThis.location.replace('/');
</script>
</head>
<body>
<h1 class="visually-hidden">Page Not Found</h1>
</body>
</html>
