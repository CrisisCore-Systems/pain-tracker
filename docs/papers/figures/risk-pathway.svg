<svg xmlns="http://www.w3.org/2000/svg" width="980" height="180" viewBox="0 0 980 180" role="img" aria-label="Risk pathway diagram">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .box { fill:#f8fafc; stroke:#334155; stroke-width:2; rx:10; }
      .text { font-family:Arial, Helvetica, sans-serif; font-size:18px; fill:#0f172a; font-weight:600; }
      .arrow { stroke:#334155; stroke-width:2.5; marker-end:url(#arrow); }
    </style>
  </defs>

  <rect class="box" x="20" y="50" width="210" height="70" />
  <text class="text" x="125" y="92" text-anchor="middle">Velocity Pressure</text>

  <line class="arrow" x1="230" y1="85" x2="290" y2="85" />

  <rect class="box" x="290" y="50" width="210" height="70" />
  <text class="text" x="395" y="92" text-anchor="middle">AI Generation Speed</text>

  <line class="arrow" x1="500" y1="85" x2="560" y2="85" />

  <rect class="box" x="560" y="50" width="190" height="70" />
  <text class="text" x="655" y="92" text-anchor="middle">Verification Gap</text>

  <line class="arrow" x1="750" y1="85" x2="810" y2="85" />

  <rect class="box" x="810" y="50" width="150" height="70" />
  <text class="text" x="885" y="92" text-anchor="middle">System Risk</text>
</svg>
