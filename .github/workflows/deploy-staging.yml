name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deployment even if tests fail'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read
  pages: write
  id-token: write
  issues: write
  pull-requests: write

# Allow only one concurrent deployment per environment
concurrency:
  group: staging-deployment
  cancel-in-progress: false

env:
  NODE_ENV: production
  VITE_APP_ENVIRONMENT: staging

jobs:
  # Pre-deployment validation
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    outputs:
      should-deploy: ${{ steps.validation.outputs.should-deploy }}
      build-hash: ${{ steps.build-hash.outputs.hash }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run comprehensive validation
        id: validation
        run: |
          echo "🔍 Running pre-deployment validation..."
          
          # Initialize validation status
          validation_passed=true
          
          # Type checking
          echo "📝 Type checking..."
          if ! npm run typecheck; then
            echo "❌ TypeScript validation failed"
            validation_passed=false
          fi
          
          # Linting
          echo "🔍 Linting..."
          if ! npm run lint; then
            echo "❌ Linting failed"
            validation_passed=false
          fi
          
          # Security checks
          echo "🛡️ Security validation..."
          if ! npm run check-security; then
            echo "❌ Security validation failed"
            validation_passed=false
          fi
          
          # Tests
          echo "🧪 Running tests..."
          if ! npm run test; then
            echo "❌ Tests failed"
            if [ "${{ github.event.inputs.force_deploy }}" != "true" ]; then
              validation_passed=false
            else
              echo "⚠️ Tests failed but force deployment requested"
            fi
          fi
          
          # Set output
          if [ "$validation_passed" = true ]; then
            echo "should-deploy=true" >> $GITHUB_OUTPUT
            echo "✅ All validations passed"
          else
            echo "should-deploy=false" >> $GITHUB_OUTPUT
            echo "❌ Validation failed"
          fi

      - name: Build for staging
        if: steps.validation.outputs.should-deploy == 'true'
        run: npm run build
        env:
          VITE_APP_ENVIRONMENT: staging
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_APP_BUILD_TIME: ${{ github.event.head_commit.timestamp || github.run_id }}
          VITE_WCB_API_ENDPOINT: ${{ secrets.WCB_API_ENDPOINT_STAGING || '/api/wcb' }}
          VITE_SENTRY_DSN: ${{ secrets.SENTRY_DSN_STAGING || '' }}
          VITE_SENTRY_ENVIRONMENT: staging
          VITE_ENABLE_ANALYTICS: 'true'
          VITE_ENABLE_DEBUG_MODE: 'true'

      - name: Generate build hash
        if: steps.validation.outputs.should-deploy == 'true'
        id: build-hash
        run: |
          hash=$(find dist -type f -exec sha256sum {} \; | sort | sha256sum | cut -d' ' -f1)
          echo "hash=$hash" >> $GITHUB_OUTPUT
          echo "📋 Staging build hash: $hash"

      - name: Upload staging build
        if: steps.validation.outputs.should-deploy == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  # Deploy to staging environment
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate
    if: needs.validate.outputs.should-deploy == 'true'
    environment: 
      name: staging
      url: https://crisiscore-systems.github.io/pain-tracker/staging/
    steps:
      - name: Deploy to staging (GitHub Pages)
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Perform health checks
        run: |
          echo "🔍 Performing staging deployment health checks..."

          # Wait for deployment to be ready
          sleep 30

          # Use environment URL where possible
          staging_url="${{ steps.deployment.outputs.page_url || 'https://crisiscore-systems.github.io/pain-tracker/staging/' }}"
          echo "Checking staging URL: $staging_url"
          if curl -f -s "$staging_url" > /dev/null; then
            echo "✅ Staging site is accessible"
          else
            echo "❌ Staging site is not accessible"
            exit 1
          fi

          # Check for build marker in deployment
          if curl -s "$staging_url" | grep -q "Staging Environment - Build"; then
            echo "📋 Build marker found in deployment"
          else
            echo "⚠️ Build marker not found; verify deployed files"
          fi

      - name: Update deployment status
        run: |
          echo "📊 Staging Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "================================" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- 🌐 **Environment**: Staging" >> $GITHUB_STEP_SUMMARY
          echo "- 📦 **Build Hash**: ${{ needs.validate.outputs.build-hash }}" >> $GITHUB_STEP_SUMMARY
          echo "- 🔗 **URL**: https://crisiscore-systems.github.io/pain-tracker/" >> $GITHUB_STEP_SUMMARY
          echo "- 📅 **Deployed**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- 🔄 **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  # Notify about deployment
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [validate, deploy-staging]
    if: always()
    steps:
      - name: Notify deployment status
        run: |
          if [ "${{ needs.deploy-staging.result }}" == "success" ]; then
            echo "✅ Staging deployment completed successfully"
            echo "🌐 Staging URL: https://crisiscore-systems.github.io/pain-tracker/"
          elif [ "${{ needs.validate.outputs.should-deploy }}" == "false" ]; then
            echo "❌ Deployment blocked due to validation failures"
          else
            echo "❌ Staging deployment failed"
          fi