name: Mutation check

on:
  workflow_dispatch: {}

jobs:
  mutation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run focused Stryker (non-blocking)
        run: |
          npx stryker run stryker.conf.cjs --logLevel info

      - name: Upload mutation report
        uses: actions/upload-artifact@v4
        with:
          name: mutation-report
          path: reports/mutation

      - name: Post summary note
        if: always()
        run: |
          {
            echo '## Mutation Testing';
            echo '';
            echo 'Mutation testing run completed. Artifact `mutation-report` uploaded.';
          } >> "$GITHUB_STEP_SUMMARY"
